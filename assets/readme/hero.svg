<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Scientific Teaching for University</title>
  <desc id="desc">A visual hero showing AI turning lecture chaos into structured teaching.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101828"/>
      <stop offset="0.55" stop-color="#17324D"/>
      <stop offset="1" stop-color="#275E5E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <g opacity="0.18" fill="none" stroke="#FFFFFF">
    <path d="M60 95H520"/>
    <path d="M60 145H430"/>
    <path d="M60 195H500"/>
    <path d="M740 85H1120"/>
    <path d="M790 135H1120"/>
    <path d="M720 185H1100"/>
  </g>
  <g transform="translate(70 68)">
    <rect x="0" y="0" width="420" height="280" rx="18" fill="#FFFFFF" opacity="0.96" filter="url(#shadow)"/>
    <text x="32" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Before</text>
    <text x="32" y="94" font-family="Consolas, monospace" font-size="19" fill="#374151">θ := θ - α∇J(θ)</text>
    <text x="32" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4B5563">“It is obvious from the gradient...”</text>
    <text x="32" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4B5563">Terminology first.</text>
    <text x="32" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4B5563">Learner gets lost.</text>
  </g>
  <g transform="translate(710 68)">
    <rect x="0" y="0" width="420" height="280" rx="18" fill="#FFFFFF" opacity="0.96" filter="url(#shadow)"/>
    <text x="32" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">After</text>
    <text x="32" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#065F46">Context → intuition → example</text>
    <text x="32" y="134" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1E3A8A">Formula symbols explained one by one</text>
    <text x="32" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7C2D12">Why this slide is here</text>
    <text x="32" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">Learner builds real understanding.</text>
  </g>
  <g transform="translate(504 138)">
    <circle cx="96" cy="70" r="70" fill="url(#accent)" opacity="0.95"/>
    <text x="96" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#0F172A">AI</text>
    <text x="96" y="96" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Teaching Skill</text>
  </g>
  <text x="600" y="392" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">Scientific Teaching for University</text>
  <text x="600" y="426" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#D1FAE5">Make AI teach like a professor who understands beginners.</text>
</svg>
