<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Four teaching modes</title>
  <desc id="desc">Four adaptive teaching modes from easy to deep dive.</desc>
  <rect width="1200" height="300" rx="24" fill="#0F172A"/>
  <text x="600" y="48" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF">4 Adaptive Teaching Modes</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(60 92)">
      <rect width="250" height="150" rx="18" fill="#DBEAFE"/>
      <text x="28" y="42" font-size="23" font-weight="800" fill="#1E3A8A">Mode 1</text>
      <text x="28" y="76" font-size="19" font-weight="700" fill="#1E40AF">Easy / 简单</text>
      <text x="28" y="110" font-size="15" fill="#1E40AF">Sentence-by-sentence</text>
      <text x="28" y="134" font-size="15" fill="#1E40AF">Light examples</text>
    </g>
    <g transform="translate(335 92)">
      <rect width="250" height="150" rx="18" fill="#D1FAE5"/>
      <text x="28" y="42" font-size="23" font-weight="800" fill="#065F46">Mode 2</text>
      <text x="28" y="76" font-size="19" font-weight="700" fill="#047857">Medium / 重点</text>
      <text x="28" y="110" font-size="15" fill="#047857">Explain key concepts</text>
      <text x="28" y="134" font-size="15" fill="#047857">Higher-level when needed</text>
    </g>
    <g transform="translate(610 92)">
      <rect width="250" height="150" rx="18" fill="#FEF3C7"/>
      <text x="28" y="42" font-size="23" font-weight="800" fill="#92400E">Mode 3</text>
      <text x="28" y="76" font-size="19" font-weight="700" fill="#B45309">Hard / 困难</text>
      <text x="28" y="110" font-size="15" fill="#B45309">Context + intuition</text>
      <text x="28" y="134" font-size="15" fill="#B45309">Formula breakdown</text>
    </g>
    <g transform="translate(885 92)">
      <rect width="250" height="150" rx="18" fill="#FFE4E6"/>
      <text x="28" y="42" font-size="23" font-weight="800" fill="#9F1239">Mode 4</text>
      <text x="28" y="76" font-size="19" font-weight="700" fill="#BE123C">Deep Dive / 深挖</text>
      <text x="28" y="110" font-size="15" fill="#BE123C">Rebuild from basics</text>
      <text x="28" y="134" font-size="15" fill="#BE123C">More concrete examples</text>
    </g>
  </g>
</svg>
